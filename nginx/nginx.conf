# =============================================================================
# Nginx — Audiobook Pipeline Reverse Proxy
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;

    # ── Upload / body size — match MAX_UPLOAD_SIZE_MB in config.py ────────────
    client_max_body_size      210M;
    client_body_timeout       120s;
    client_header_timeout     30s;

    # ── Proxy timeouts — generous: TTS + video can take many minutes ──────────
    proxy_connect_timeout     10s;
    proxy_send_timeout        600s;
    proxy_read_timeout        600s;
    send_timeout              600s;

    # ── Upstream: Flask / Gunicorn ────────────────────────────────────────────
    upstream flask_app {
        server app:5000;
        keepalive 16;
    }

    # =========================================================================
    # HTTP — redirect everything to HTTPS
    # Comment this block and keep only the HTTP server below if you don't use SSL
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt / ACME challenge (if you add Certbot later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS — main server block
    # Replace the ssl_certificate paths with your actual cert files.
    # If you don't have SSL certs yet, comment out this block and uncomment
    # the plain-HTTP block at the bottom instead.
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name _;                       # replace with your domain

        # ── SSL certificates ─────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options        SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection       "1; mode=block";

        # ── Proxy to Flask ────────────────────────────────────────────────────
        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";   # enables keep-alive to upstream

            # Buffer — turn off for large file downloads so they stream directly
            proxy_buffering            off;
            proxy_request_buffering    off;
        }

        # ── Audio / video downloads — optimise for large files ────────────────
        location ~* \.(mp3|mp4|wav)$ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering    off;
            proxy_read_timeout 600s;

            # Allow browsers to resume partial downloads
            proxy_set_header   Range $http_range;
            proxy_set_header   If-Range $http_if_range;
        }
    }

    # =========================================================================
    # Plain HTTP server (no SSL)
    # Uncomment this block if you are running locally / without certificates
    # and comment out both server blocks above.
    # =========================================================================
    # server {
    #     listen 80;
    #     server_name _;
    #
    #     client_max_body_size 210M;
    #
    #     location / {
    #         proxy_pass         http://flask_app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_set_header   Connection        "";
    #         proxy_buffering    off;
    #         proxy_read_timeout 600s;
    #     }
    # }
}